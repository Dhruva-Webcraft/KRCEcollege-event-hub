<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .admin-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--glass-bg);
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
        }

        .admin-nav button {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: var(--text-dark);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-nav button.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        .admin-section {
            display: none;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
        }

        .admin-section.active {
            display: block;
        }

        .login-wrapper {
            max-width: 450px;
            margin: 4rem auto;
            position: relative;
            z-index: 10;
        }

        #dashboardContainer {
            display: none;
            width: 100%;
        }

        .preview-img {
            max-width: 150px;
            max-height: 150px;
            margin-top: 1rem;
            border-radius: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <ion-icon name="calendar-outline" style="margin-right:0.5rem"></ion-icon> Event Hub
        </div>
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <ion-icon name="home-outline"></ion-icon> Dashboard
            </a>
            <a href="events.html" class="menu-item">
                <ion-icon name="list-outline"></ion-icon> Events
            </a>
            <a href="calendar.html" class="menu-item">
                <ion-icon name="calendar-number-outline"></ion-icon> Calendar
            </a>
            <a href="register.html" class="menu-item">
                <ion-icon name="document-text-outline"></ion-icon> Register
            </a>
            <a href="admin.html" class="menu-item active">
                <ion-icon name="settings-outline"></ion-icon> Admin Panel
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <ion-icon name="menu-outline" class="hamburger" id="hamburger"></ion-icon>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <div class="content-area">
            
            <!-- Login -->
            <div id="loginContainer" class="login-wrapper glass-card">
                <div style="text-align:center; margin-bottom: 2rem;">
                    <ion-icon name="lock-closed-outline" style="font-size: 3rem; color: var(--primary-color);"></ion-icon>
                    <h2 style="font-size: 2rem;">Admin Login</h2>
                    <p style="color: #6b7280;">Sign in to unlock management tools</p>
                </div>
                <div id="loginError" style="color: red; text-align: center; margin-bottom: 1rem; display: none;">Invalid credentials</div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username (admin)</label>
                        <input type="text" id="username" class="form-control" required placeholder="admin">
                    </div>
                    <div class="form-group">
                        <label>Password (admin123)</label>
                        <input type="password" id="password" class="form-control" required placeholder="admin123">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size:1.1rem; padding: 1rem;">Unlock Dashboard</button>
                </form>
            </div>

            <!-- Dashboard -->
            <div id="dashboardContainer">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="font-size: 2rem;"><ion-icon name="settings-outline" style="vertical-align: -2px;"></ion-icon> Control Panel</h2>
                </div>

                <div class="admin-nav">
                    <button class="active" onclick="switchTab('manageEvents', this)"><ion-icon name="calendar-outline"></ion-icon> Manage Events</button>
                    <button onclick="switchTab('addEvent', this)"><ion-icon name="add-circle-outline"></ion-icon> Add/Edit Event</button>
                    <button onclick="switchTab('registrations', this)"><ion-icon name="people-outline"></ion-icon> Registrations</button>
                    <button onclick="logout()" style="margin-left: auto; color: #ef4444; border: 1px solid #fee2e2;"><ion-icon name="log-out-outline"></ion-icon> Logout</button>
                </div>

                <!-- Manage Events -->
                <div id="manageEvents" class="admin-section active">
                    <h3 style="margin-bottom:1.5rem;">All Events Directory</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Poster</th>
                                    <th>Date</th>
                                    <th>Name</th>
                                    <th>Venue</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminEventsTable">
                                <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add/Edit Event -->
                <div id="addEvent" class="admin-section">
                    <h3 style="margin-bottom:1.5rem;" id="formTitle">Create New Event</h3>
                    <div id="addMessage" style="padding: 1rem; margin-bottom: 1rem; display: none; border-radius: 0.5rem; text-align:center;"></div>
                    
                    <form id="eventForm" enctype="multipart/form-data">
                        <input type="hidden" id="editEventId" name="editEventId">
                        
                        <div class="form-group">
                            <label>Event Poster Image</label>
                            <input type="file" name="poster" id="posterInput" class="form-control" accept="image/*">
                            <img id="posterPreview" class="preview-img">
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                            <div class="form-group">
                                <label>Event Name</label>
                                <input type="text" name="event_name" id="event_name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Date & Time</label>
                                <input type="datetime-local" name="event_date" id="event_date" class="form-control" required>
                            </div>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                            <div class="form-group">
                                <label>Venue</label>
                                <input type="text" name="venue" id="venue" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Time String (e.g. 10:00 AM)</label>
                                <input type="text" name="time" id="time" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Organizer</label>
                            <input type="text" name="organizer" id="organizer" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" id="description" class="form-control" rows="5" required></textarea>
                        </div>

                        <div style="display:flex; gap:1rem; margin-top:2rem;">
                            <button type="submit" class="btn btn-primary" id="saveEventBtn" style="padding:1rem 2rem;"><ion-icon name="save-outline"></ion-icon> Save Event</button>
                            <button type="button" class="btn btn-outline" onclick="resetEventForm()">Cancel / Reset</button>
                        </div>
                    </form>
                </div>

                <!-- Registrations -->
                <div id="registrations" class="admin-section">
                    <h3 style="margin-bottom:1.5rem;">Registered Students</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Reg. ID</th>
                                    <th>Name</th>
                                    <th>Contact</th>
                                    <th>Event</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="registrationsTable">
                                <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
