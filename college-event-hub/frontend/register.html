<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - College Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Include QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <!-- identical to other files -->
        <div class="sidebar-header">
            <ion-icon name="calendar-outline" style="margin-right:0.5rem"></ion-icon> Event Hub
        </div>
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <ion-icon name="home-outline"></ion-icon> Dashboard
            </a>
            <a href="events.html" class="menu-item">
                <ion-icon name="list-outline"></ion-icon> Events
            </a>
            <a href="calendar.html" class="menu-item">
                <ion-icon name="calendar-number-outline"></ion-icon> Calendar
            </a>
            <a href="register.html" class="menu-item active">
                <ion-icon name="document-text-outline"></ion-icon> Register
            </a>
            <a href="admin.html" class="menu-item">
                <ion-icon name="settings-outline"></ion-icon> Admin Panel
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <ion-icon name="menu-outline" class="hamburger" id="hamburger"></ion-icon>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <div class="content-area">
            <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem;">
                <h2 style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Register for an Event</h2>
                
                <div id="messageBox" style="display:none; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; text-align: center;"></div>
                
                <div id="qrCodeContainer" style="display:none; text-align:center; margin-bottom: 2rem;">
                    <h3 style="margin-bottom: 1rem;">Registration Successful!</h3>
                    <p style="color:#6b7280; margin-bottom: 1rem;">Please save this QR code for event entry verification.</p>
                    <canvas id="qrCodeCanvas" style="background:#fff; padding:10px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);"></canvas>
                    <div style="margin-top: 1rem;">
                        <button class="btn btn-primary" onclick="location.reload()">Register Another</button>
                    </div>
                </div>

                <form id="registrationForm">
                    <div class="form-group">
                        <label>Select Event <span style="color:red">*</span></label>
                        <select id="event_id" name="event_id" class="form-control" required>
                            <option value="">-- Loading events... --</option>
                        </select>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Full Name <span style="color:red">*</span></label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email <span style="color:red">*</span></label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" name="department" class="form-control" placeholder="e.g. CS">
                        </div>
                        <div class="form-group">
                            <label>Year</label>
                            <select name="year" class="form-control">
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size:1.1rem;">
                        <ion-icon name="checkmark-circle-outline"></ion-icon> Complete Registration
                    </button>
                    <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#6b7280;">
                        A confirmation email will automatically be sent to you upon success.
                    </p>
                </form>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
